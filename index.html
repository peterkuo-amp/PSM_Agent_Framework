<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSM Sub-agent + Skill Priority Guide v3</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#FAFAF8;padding:24px 20px 48px;color:#1A1A18;max-width:1040px;margin:0 auto;}
h1{font-size:22px;font-weight:700;color:#1A1A18;margin-bottom:3px;}
.sub{font-size:12px;color:#888780;margin-bottom:16px;}

/* View toggle */
.view-toggle{display:flex;gap:6px;margin-bottom:16px;}
.vtbtn{padding:6px 14px;border-radius:7px;border:1px solid #E0DED7;background:#fff;cursor:pointer;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;color:#5F5E5A;transition:all .15s;display:flex;align-items:center;gap:5px;}
.vtbtn:hover{border-color:#C8C6BE;}
.vtbtn.active{border-color:#534AB7;background:#EEEDFE;color:#3C3489;}

/* Claim row */
.claim-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:10px 14px;background:#fff;border:0.5px solid #E8E6E0;border-radius:8px;flex-wrap:wrap;}
.claim-row label{font-size:11px;color:#5F5E5A;white-space:nowrap;}
.claim-row input[type="text"]{border:0.5px solid #E0DED7;border-radius:5px;padding:5px 9px;font-size:11px;font-family:'DM Sans',sans-serif;color:#1A1A18;background:#FAFAF8;outline:none;width:180px;}
.claim-row input[type="text"]:focus{border-color:#534AB7;}
.claim-row .claim-hint{font-size:10px;color:#B4B2A9;font-style:italic;}

/* Summary */
.summary-bar{display:flex;gap:16px;padding:10px 14px;background:#fff;border:0.5px solid #E8E6E0;border-radius:8px;margin-bottom:16px;flex-wrap:wrap;}
.stat{display:flex;flex-direction:column;gap:1px;}
.stat-val{font-size:18px;font-weight:700;color:#1A1A18;font-family:'DM Mono',monospace;}
.stat-label{font-size:10px;color:#888780;}
.stat-val.green{color:#27500A;}
.stat-val.amber{color:#854F0B;}

/* Filter bar */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.filter-group-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#B4B2A9;font-family:'DM Mono',monospace;margin-bottom:5px;margin-top:10px;}
.fbtn{padding:5px 12px;border-radius:6px;border:1px solid #E0DED7;background:#fff;cursor:pointer;font-size:11px;font-weight:500;font-family:'DM Sans',sans-serif;color:#5F5E5A;transition:all .15s;}
.fbtn:hover{border-color:#C8C6BE;}
.fbtn.active{border-color:#534AB7;background:#EEEDFE;color:#3C3489;}
.fbtn.active-open{border-color:#27500A;background:#EAF3DE;color:#27500A;}
.fbtn.active-claimed{border-color:#993C1D;background:#FAECE7;color:#712B13;}

/* Branch filter pills — each branch gets its own color */
.fbtn.br-daily{border-color:#185FA5;color:#0C447C;}
.fbtn.br-daily.active{background:#E6F1FB;border-color:#185FA5;color:#0C447C;}
.fbtn.br-perf{border-color:#993C1D;color:#712B13;}
.fbtn.br-perf.active{background:#FAECE7;border-color:#993C1D;color:#712B13;}
.fbtn.br-deal{border-color:#854F0B;color:#633806;}
.fbtn.br-deal.active{background:#FAEEDA;border-color:#854F0B;color:#633806;}
.fbtn.br-cosell{border-color:#993556;color:#72243E;}
.fbtn.br-cosell.active{background:#FBEAF0;border-color:#993556;color:#72243E;}
.fbtn.br-xfn{border-color:#3B6D11;color:#27500A;}
.fbtn.br-xfn.active{background:#EAF3DE;border-color:#3B6D11;color:#27500A;}

/* ── LIST VIEW ── */
.tier-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#B4B2A9;font-family:'DM Mono',monospace;margin:20px 0 8px;padding-bottom:5px;border-bottom:1px solid #F0EEE8;}
.cards{display:flex;flex-direction:column;gap:7px;}
.card{display:grid;grid-template-columns:32px 28px 1fr auto;gap:0 10px;align-items:start;padding:11px 14px;background:#fff;border:0.5px solid #E8E6E0;border-radius:10px;transition:border-color .15s,box-shadow .15s;position:relative;}
.card:hover{border-color:#C8C6BE;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.card.expanded{border-color:#534AB7;box-shadow:0 0 0 1px rgba(83,74,183,.1);}
.card.claimed{border-color:#97C459;background:#FAFFF7;}
.card.hidden{display:none;}
.cb-col{display:flex;flex-direction:column;align-items:center;gap:4px;padding-top:2px;}
.cb-wrap{position:relative;width:18px;height:18px;}
.cb-wrap input[type="checkbox"]{position:absolute;opacity:0;width:18px;height:18px;cursor:pointer;margin:0;z-index:2;}
.cb-box{width:18px;height:18px;border-radius:4px;border:1.5px solid #D3D1C7;background:#fff;display:flex;align-items:center;justify-content:center;transition:all .15s;pointer-events:none;}
.cb-wrap input:checked ~ .cb-box{background:#3B6D11;border-color:#3B6D11;}
.cb-check{display:none;width:10px;height:10px;}
.cb-wrap input:checked ~ .cb-box .cb-check{display:block;}
.owner-badge{font-size:9px;font-weight:600;color:#27500A;background:#EAF3DE;border-radius:3px;padding:1px 4px;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;display:none;}
.owner-badge.visible{display:block;}
.rank{font-size:12px;font-weight:700;color:#C8C6BE;text-align:center;padding-top:2px;font-family:'DM Mono',monospace;}
.card-clickable{cursor:pointer;}
.card-title{font-size:13px;font-weight:600;color:#1A1A18;line-height:1.3;margin-bottom:3px;}
.card-desc{font-size:11px;color:#5F5E5A;line-height:1.5;margin-bottom:5px;}
.pills{display:flex;flex-wrap:wrap;gap:4px;}
.pill{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;white-space:nowrap;}
.p-pillar{background:#F1EFE8;color:#5F5E5A;}
.p-b1{background:#EAF3DE;color:#27500A;}.p-b2{background:#E1F5EE;color:#085041;}.p-b3{background:#FAEEDA;color:#633806;}.p-b4{background:#FAECE7;color:#712B13;}.p-b5{background:#FCEBEB;color:#791F1F;}
.p-new{background:#FFF8E1;color:#633806;border:1px dashed #BA7517;}
.p-live{background:#EAF3DE;color:#27500A;border:1px solid #97C459;}
.p-agent{background:#EEEDFE;color:#3C3489;border:1px solid #AFA9EC;}
.p-skill{background:#F1EFE8;color:#444441;border:1px solid #B4B2A9;}
/* Branch pills */
.p-br-daily{background:#E6F1FB;color:#0C447C;}
.p-br-perf{background:#FAECE7;color:#712B13;}
.p-br-deal{background:#FAEEDA;color:#633806;}
.p-br-cosell{background:#FBEAF0;color:#72243E;}
.p-br-xfn{background:#EAF3DE;color:#27500A;}
.scores{display:flex;flex-direction:column;gap:4px;min-width:58px;padding-top:2px;}
.srow{display:flex;align-items:center;gap:4px;}
.slabel{font-size:9px;color:#B4B2A9;font-family:'DM Mono',monospace;min-width:26px;text-align:right;}
.strack{height:4px;width:48px;border-radius:2px;background:#F1EFE8;overflow:hidden;}
.sfill{height:4px;border-radius:2px;}
.detail{display:none;grid-column:1/-1;margin-top:10px;padding-top:10px;border-top:1px solid #F5F3EE;}
.card.expanded .detail{display:block;}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;}
.dblock .dlabel{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#B4B2A9;font-family:'DM Mono',monospace;margin-bottom:3px;}
.dblock .dtext{font-size:11px;color:#5F5E5A;line-height:1.55;}
.deps-block{margin-top:10px;}
.deps-block .dlabel{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#B4B2A9;font-family:'DM Mono',monospace;margin-bottom:5px;}
.deps-list{display:flex;flex-wrap:wrap;gap:4px;}
.dep-chip{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;border:0.5px solid;}
.dep-confirmed{background:#EAF3DE;color:#27500A;border-color:#97C459;}
.dep-uncertain{background:#FFF8E1;color:#633806;border-color:#EF9F27;}
.dep-skill{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC;cursor:pointer;}
.dep-skill:hover{background:#D6D3F8;}
.dep-none{background:#F1EFE8;color:#5F5E5A;border-color:#C8C6BE;}
.type-block{margin-top:10px;padding:7px 10px;border-radius:6px;}
.type-block.is-agent{background:#EEEDFE30;border-left:2px solid #534AB7;}
.type-block.is-skill{background:#F1EFE830;border-left:2px solid #5F5E5A;}
.type-block-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:2px;}
.is-agent .type-block-label{color:#534AB7;}.is-skill .type-block-label{color:#5F5E5A;}
.type-block-text{font-size:11px;color:#5F5E5A;line-height:1.5;}
.team-note{margin-top:9px;padding:6px 10px;border-left:2px solid #534AB7;background:#EEEDFE18;border-radius:0 5px 5px 0;font-size:11px;color:#534AB7;font-style:italic;}
.claimed-banner{display:none;grid-column:1/-1;margin-top:6px;padding:5px 10px;background:#EAF3DE;border-radius:5px;font-size:11px;color:#27500A;font-weight:500;}
.card.claimed .claimed-banner{display:block;}

/* ── TREE VIEW ── */
/* treeView visibility controlled by JS inline style */
.tree-branch{margin-bottom:28px;}
.tree-branch-header{font-size:13px;font-weight:600;color:#1A1A18;margin-bottom:12px;padding:8px 12px;border-radius:8px;display:flex;align-items:center;gap:8px;}
.tree-branch-header .br-count{font-size:11px;font-weight:400;color:inherit;opacity:.7;}
.br-hdr-daily{background:#E6F1FB;color:#0C447C;}
.br-hdr-perf{background:#FAECE7;color:#712B13;}
.br-hdr-deal{background:#FAEEDA;color:#633806;}
.br-hdr-cosell{background:#FBEAF0;color:#72243E;}
.br-hdr-xfn{background:#EAF3DE;color:#27500A;}

/* Tree layout: nodes + edges */
.tree-nodes{display:flex;flex-direction:column;gap:0;padding-left:20px;border-left:2px solid #F0EEE8;margin-left:8px;}
.tree-node{position:relative;margin-bottom:8px;}
.tree-node::before{content:'';position:absolute;left:-20px;top:18px;width:16px;height:2px;background:#F0EEE8;}
.tree-node-card{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:#fff;border:0.5px solid #E8E6E0;border-radius:8px;cursor:pointer;transition:border-color .15s;}
.tree-node-card:hover{border-color:#C8C6BE;}
.tree-node-card.has-deps-unbuilt{border-color:#EF9F27;background:#FFFDF7;}
.tree-node-card.claimed{border-color:#97C459;background:#FAFFF7;}
.tree-node-info{flex:1;min-width:0;}
.tree-node-title{font-size:12px;font-weight:600;color:#1A1A18;margin-bottom:2px;}
.tree-node-desc{font-size:11px;color:#888780;line-height:1.4;}
.tree-node-pills{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.tree-node-pills .pill{font-size:9px;padding:1px 5px;}
.tree-cb{flex-shrink:0;margin-top:1px;}
/* Skill dependency sub-nodes (indented children in tree) */
.tree-children{padding-left:28px;border-left:2px dashed #E8E6E0;margin-left:20px;margin-top:4px;margin-bottom:4px;}
.tree-child-node{position:relative;margin-bottom:6px;}
.tree-child-node::before{content:'';position:absolute;left:-20px;top:14px;width:16px;height:2px;background:#E8E6E0;border-top:2px dashed #E8E6E0;}
.tree-dep-label{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#B4B2A9;font-family:'DM Mono',monospace;margin-bottom:4px;margin-top:6px;display:flex;align-items:center;gap:4px;}
.dep-warning{display:inline-block;background:#FFF8E1;color:#854F0B;border:1px solid #EF9F27;border-radius:3px;padding:1px 5px;font-size:9px;font-weight:600;}
</style>
</head>
<body>

<h1>PSM Sub-agent + Skill priority guide</h1>
<div class="sub">24 items · list view or dependency tree · check a box to claim for AI Week</div>

<!-- View toggle -->
<div class="view-toggle">
  <button class="vtbtn active" id="btnList" onclick="setView('list')">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="0" y="1" width="13" height="2" rx="1" fill="currentColor"/><rect x="0" y="5.5" width="13" height="2" rx="1" fill="currentColor"/><rect x="0" y="10" width="13" height="2" rx="1" fill="currentColor"/></svg>
    List view
  </button>
  <button class="vtbtn" id="btnTree" onclick="setView('tree')">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="2" cy="2" r="1.5" fill="currentColor"/><circle cx="9" cy="6.5" r="1.5" fill="currentColor"/><circle cx="2" cy="11" r="1.5" fill="currentColor"/><line x1="2" y1="2" x2="9" y2="6.5" stroke="currentColor" stroke-width="1.2"/><line x1="2" y1="11" x2="9" y2="6.5" stroke="currentColor" stroke-width="1.2"/></svg>
    Dependency tree
  </button>
</div>

<!-- Claim row -->
<div class="claim-row">
  <label>Your name (for claiming):</label>
  <input type="text" id="claimName" placeholder="e.g. Ethem, Kelly, DC…" oninput="updateClaimHint()">
  <span class="claim-hint" id="claimHint">Enter your name, then check a box to claim an item</span>
</div>

<!-- Summary bar -->
<div class="summary-bar">
  <div class="stat"><span class="stat-val" id="s-total">24</span><span class="stat-label">Total</span></div>
  <div class="stat"><span class="stat-val green" id="s-claimed">0</span><span class="stat-label">Claimed</span></div>
  <div class="stat"><span class="stat-val amber" id="s-open">24</span><span class="stat-label">Open</span></div>
  <div class="stat"><span class="stat-val" id="s-agent">—</span><span class="stat-label">Sub-agents</span></div>
  <div class="stat"><span class="stat-val" id="s-skill">—</span><span class="stat-label">Skills</span></div>
</div>

<!-- LIST VIEW filters (hidden in tree view) -->
<div id="listFilters">
  <div class="filter-group-label">Filter by tier</div>
  <div class="filter-row">
    <button class="fbtn active" onclick="setFilter('all',this)">All (24)</button>
    <button class="fbtn" onclick="setFilter('starter',this)">Starter (8)</button>
    <button class="fbtn" onclick="setFilter('medium',this)">Medium (9)</button>
    <button class="fbtn" onclick="setFilter('harder',this)">Harder (7)</button>
    <button class="fbtn" onclick="setFilter('new',this)">New in v3</button>
    <button class="fbtn" onclick="setFilter('live',this)">Already live</button>
  </div>
  <div class="filter-group-label">Filter by type</div>
  <div class="filter-row">
    <button class="fbtn" onclick="setFilter('agent',this)">Sub-agents only</button>
    <button class="fbtn" onclick="setFilter('skill',this)">Skills only</button>
  </div>
  <div class="filter-group-label">Filter by PSM agent branch</div>
  <div class="filter-row">
    <button class="fbtn br-daily" onclick="setFilter('br-daily',this)">Daily Prioritization</button>
    <button class="fbtn br-perf"  onclick="setFilter('br-perf',this)">Partner Performance</button>
    <button class="fbtn br-deal"  onclick="setFilter('br-deal',this)">Deal &amp; Pipeline Mgmt</button>
    <button class="fbtn br-cosell" onclick="setFilter('br-cosell',this)">Co-sell Collab Tools</button>
    <button class="fbtn br-xfn"   onclick="setFilter('br-xfn',this)">Cross-Functional Requests</button>
  </div>
  <div class="filter-group-label">Filter by claim status</div>
  <div class="filter-row">
    <button class="fbtn" onclick="setFilter('open',this)">Open (unclaimed)</button>
    <button class="fbtn" onclick="setFilter('claimed',this)">Claimed this week</button>
  </div>
</div>

<div id="listView" style="margin-top:16px;"></div>
<div id="treeView" style="margin-top:16px;display:none;"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
// branch: one of "daily" | "perf" | "deal" | "cosell" | "xfn"
// skillDeps: ranks of skills that must be built first (creates tree edges)
// desc: 1-2 sentence description visible on card face

const A = [
  {rank:1, title:"Business problem narrative",
   branch:"xfn", tier:"starter", build:1, isNew:false, isLive:false,
   type:"agent",
   typeReason:"Has a goal (frame a compelling client narrative), makes editorial decisions, produces shaped output. Judgment at every section.",
   desc:"Turns a client name, industry, and challenge into a structured consultant-grade narrative — problem framing, why it's hard, reference story, transformation path, and Amplitude's role — ready for a partner to use in a client meeting.",
   deps:[{n:"Google Drive",s:"confirmed"},{n:"Internal KB docs",s:"confirmed"}],
   skillDeps:[],
   why:"Pure prompt + Drive RAG. Zero connectors needed. Write a system prompt, point at a doc folder, done in under an hour.",
   conn:"Google Drive (read only)", out:"Slack reply",
   note:"No Slack signal of anyone building this yet — wide open. Perfect for Kelly or Nick."},

  {rank:2, title:"Pricing + narrative",
   branch:"xfn", tier:"starter", build:1, isNew:false, isLive:false,
   type:"agent",
   typeReason:"Must assess deal context, retrieve the right pricing tier, and construct a framing narrative. The narrative component requires judgment.",
   desc:"Generates a deal-stage-appropriate pricing estimate with a built-in framing narrative — explains the commercial value before showing the number, and declines to produce a price until sufficient deal context is provided.",
   deps:[{n:"Google Drive",s:"confirmed"},{n:"Pricing doc",s:"confirmed"}],
   skillDeps:[],
   why:"Drive RAG + a pricing doc. No connector beyond Drive.",
   conn:"Google Drive (read only)", out:"Slack reply",
   note:"Jaimie, DC, Marilisa all flagged pricing calculator gaps in weekly updates."},

  {rank:3, title:"Weekly update drafter",
   branch:"daily", tier:"starter", build:1, isNew:false, isLive:false,
   type:"agent",
   typeReason:"Synthesizes from multiple sources, makes editorial decisions about what to include, formats for a specific audience. Judgment required.",
   desc:"Pre-populates the team's standard weekly check-in format from SFDC pipeline data — wins, deliverables, and help-needed — so a PSM can review and send rather than draft from scratch every Sunday.",
   deps:[{n:"Salesforce",s:"confirmed"}],
   skillDeps:[],
   why:"SFDC read (one report query), format into the team's existing check-in template.",
   conn:"Salesforce (read)", out:"Slack / doc",
   note:"Elli already runs a personal version via Cowork. This standardizes it for the whole team."},

  {rank:4, title:"Morning digest",
   branch:"daily", tier:"starter", build:2, isNew:false, isLive:true,
   type:"agent",
   typeReason:"Has a goal (surface what needs attention today), makes prioritization decisions, pulls from multiple sources, produces a shaped narrative.",
   desc:"Delivers a daily 8am briefing covering deal changes, Slack mentions, calendar prep, and flagged action items — surfacing only what actually needs attention so the PSM starts the day focused, not overwhelmed.",
   deps:[{n:"Slack",s:"confirmed"},{n:"Google Calendar",s:"confirmed"},{n:"Salesforce",s:"confirmed"}],
   skillDeps:[],
   why:"Slack + GCal reads only. Ethem has 4 live variants. Most proven pattern on the team.",
   conn:"Slack + GCal + Salesforce (read)", out:"Slack reply",
   note:"Ethem's Agents 3 and 4 are doing this now."},

  {rank:5, title:"MQL flag (read-only)",
   branch:"xfn", tier:"starter", build:2, isNew:true, isLive:false,
   type:"skill",
   typeReason:"Domain filter applied to a list. Rule-based, deterministic, read-only. No judgment.",
   desc:"Reads the MQL list from SFDC, applies a blocklist of generic email domains (gmail, naver, yahoo, hotmail, etc.), and surfaces a filtered list to the PSM with a count and recommended bulk-rejection action — since SFDC is read-only, the PSM actions it manually.",
   deps:[{n:"Salesforce",s:"confirmed"}],
   skillDeps:[],
   why:"SFDC read + a domain blocklist in the prompt. Pure filter logic.",
   conn:"Salesforce (read only)", out:"Slack list to PSM",
   note:"DC flagged this. SFDC write ceiling is confirmed — document it explicitly."},

  {rank:6, title:"Partner profile",
   branch:"perf", tier:"starter", build:2, isNew:false, isLive:false,
   type:"skill",
   typeReason:"Structured data retrieval and formatting from SFDC. Returns a consistent schema every time. No judgment — called by other sub-agents.",
   desc:"Returns a structured one-page snapshot of a partner company: pipeline contribution, book of business, customer count, active projects by segment and region, and PSM owner — callable directly or as a component of higher-level agents.",
   deps:[{n:"Salesforce",s:"confirmed"}],
   skillDeps:[],
   why:"SFDC read query on a partner account. Format BOB, pipeline, customer count.",
   conn:"Salesforce (read)", out:"Slack reply",
   note:"Jaimie and Chayter both do Merkle QBR prep manually. Direct time-save."},

  {rank:7, title:"Exec roll-up",
   branch:"daily", tier:"starter", build:2, isNew:false, isLive:false,
   type:"skill",
   typeReason:"A formatting and reshaping operation on output from other sub-agents. No new retrieval or judgment — transforms existing output by audience level.",
   desc:"Takes any standard PSM Agent output and reshapes it for exec consumption: strips operational detail, leads with the headline metric, adds regional summary and top 3 flags. Invoked by appending 'for exec' or 'for Peter' to any query.",
   deps:[{n:"Salesforce",s:"confirmed"}],
   skillDeps:[],
   why:"Same SFDC query as bookings, reshaped by audience_level param.",
   conn:"Salesforce (read)", out:"Structured doc",
   note:"Peter explicitly asked Courtney for an AI workflow to do this."},

  {rank:8, title:"Cert tracker",
   branch:"perf", tier:"starter", build:2, isNew:false, isLive:false,
   type:"skill",
   typeReason:"Reads cert data, applies an expiry threshold rule, generates an alert. Deterministic — no judgment, just whether the threshold is triggered.",
   desc:"Monitors partner certification data for expiring or missing certs against the target (5 sales + 2 delivery per reseller), generates Slack alerts to the PSM owner with the specific partners and individuals at risk.",
   deps:[{n:"Salesforce",s:"confirmed"},{n:"Google Drive",s:"confirmed"}],
   skillDeps:[],
   why:"SFDC or Drive read for cert data. Kelly already tracks this in a spreadsheet.",
   conn:"Salesforce / Drive (read)", out:"Slack alert",
   note:"Kelly explicitly said she wants an agent to report on certification completion."},

  {rank:9, title:"Deal note capture",
   branch:"deal", tier:"medium", build:3, isNew:false, isLive:false,
   type:"skill",
   typeReason:"Slack trigger → parse note → write to SFDC field. Deterministic pipeline. No judgment.",

// ── CONSTANTS ──────────────────────────────────────────────────────────
const TIER_LABELS = {
  starter:"Tier 1 — Starter  (build in a day)",
  medium: "Tier 2 — Medium  (2–3 days)",
  harder: "Tier 3 — Harder  (3–5 days or post-AI Week)"
};
const BUILD_LABEL = ["","Very easy","Easy","Medium","Hard","Complex"];
const BUILD_CLS   = ["","p-b1","p-b2","p-b3","p-b4","p-b5"];
const BUILD_COLOR = ["","#3B6D11","#0F6E56","#854F0B","#993C1D","#791F1F"];

const BRANCHES = {
  daily:  {label:"Daily Prioritization",       hdr:"br-hdr-daily",  pill:"p-br-daily"},
  perf:   {label:"Partner Performance",         hdr:"br-hdr-perf",   pill:"p-br-perf"},
  deal:   {label:"Deal & Pipeline Mgmt",        hdr:"br-hdr-deal",   pill:"p-br-deal"},
  cosell: {label:"Co-sell Collab Tools",        hdr:"br-hdr-cosell", pill:"p-br-cosell"},
  xfn:    {label:"Cross-Functional Requests",   hdr:"br-hdr-xfn",    pill:"p-br-xfn"},
};

const BRANCH_BTN_CLS = {
  daily:"br-daily", perf:"br-perf", deal:"br-deal", cosell:"br-cosell", xfn:"br-xfn"
};

// ── STATE ──────────────────────────────────────────────────────────────
let activeFilter = "all";
let expandedRank = null;
let currentView  = "list";
const claimed    = {};

// ── CLAIM ──────────────────────────────────────────────────────────────
function getClaimName() { return document.getElementById("claimName").value.trim(); }
function updateClaimHint() {
  const n = getClaimName();
  document.getElementById("claimHint").textContent = n
    ? `Checking a box will claim that item for ${n}`
    : "Enter your name, then check a box to claim an item";
}
function handleClaim(rank, checked, e) {
  e.stopPropagation();
  const name = getClaimName();
  if (checked && !name) { alert("Enter your name above before claiming."); e.target.checked = false; return; }
  if (checked) { claimed[rank] = name; } else { delete claimed[rank]; }
  updateSummary();
  currentView === "list" ? renderList() : renderTree();
}

// ── SUMMARY ────────────────────────────────────────────────────────────
function updateSummary() {
  const cc = Object.keys(claimed).length;
  document.getElementById("s-total").textContent   = A.length;
  document.getElementById("s-claimed").textContent = cc;
  document.getElementById("s-open").textContent    = A.length - cc;
  document.getElementById("s-agent").textContent   = A.filter(a => a.type==="agent").length;
  document.getElementById("s-skill").textContent   = A.filter(a => a.type==="skill").length;
}

// ── VIEW TOGGLE ─────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById("btnList").classList.toggle("active", v==="list");
  document.getElementById("btnTree").classList.toggle("active", v==="tree");
  document.getElementById("listFilters").style.display = v==="list" ? "block" : "none";
  document.getElementById("listView").style.display    = v==="list" ? "block" : "none";
  document.getElementById("treeView").style.display    = v==="tree" ? "block" : "none";
  if (v==="tree") renderTree(); else renderList();
}

// ── FILTER (list view) ─────────────────────────────────────────────────
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active","active-open","active-claimed"));
  if      (f==="open")    btn.classList.add("active-open");
  else if (f==="claimed") btn.classList.add("active-claimed");
  else                    btn.classList.add("active");
  renderList();
}
function toggle(rank) { expandedRank = expandedRank===rank ? null : rank; renderList(); }

function visible(a) {
  if (activeFilter==="all")       return true;
  if (activeFilter==="starter")   return a.tier==="starter";
  if (activeFilter==="medium")    return a.tier==="medium";
  if (activeFilter==="harder")    return a.tier==="harder";
  if (activeFilter==="new")       return a.isNew;
  if (activeFilter==="live")      return a.isLive;
  if (activeFilter==="agent")     return a.type==="agent";
  if (activeFilter==="skill")     return a.type==="skill";
  if (activeFilter==="open")      return !claimed[a.rank];
  if (activeFilter==="claimed")   return !!claimed[a.rank];
  if (activeFilter.startsWith("br-")) return a.branch === activeFilter.slice(3);
  return true;
}

// ── HELPERS ────────────────────────────────────────────────────────────
function depChip(dep) {
  const cls  = dep.s==="confirmed" ? "dep-confirmed" : dep.s==="uncertain" ? "dep-uncertain" : "dep-none";
  const icon = dep.s==="confirmed" ? "✓ " : dep.s==="uncertain" ? "? " : "";
  return `<span class="dep-chip ${cls}">${icon}${dep.n}</span>`;
}
function skillDepChip(rank) {
  const a = A.find(x => x.rank===rank);
  if (!a) return "";
  const built = !!claimed[rank];
  return `<span class="dep-chip dep-skill" onclick="event.stopPropagation();jumpTo(${rank})" title="Jump to: ${a.title}">${built?"✓ ":"⚠ "}${a.title}</span>`;
}
function jumpTo(rank) {
  setView("list");
  expandedRank = rank;
  setFilter("all", document.querySelector(".fbtn.active") || document.querySelector(".fbtn"));
  setTimeout(() => {
    const el = document.querySelector(`[data-rank="${rank}"]`);
    if (el) el.scrollIntoView({behavior:"smooth", block:"center"});
  }, 80);
}
function cbHtml(rank) {
  const isClaimed = !!claimed[rank];
  const owner = claimed[rank] || "";
  return `<div class="cb-col">
    <div class="cb-wrap">
      <input type="checkbox" ${isClaimed?"checked":""} onchange="handleClaim(${rank},this.checked,event)">
      <div class="cb-box"><svg class="cb-check" viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
    <div class="owner-badge ${isClaimed?"visible":""}">${owner}</div>
  </div>`;
}

// ── LIST RENDER ────────────────────────────────────────────────────────
function renderList() {
  let html = "";
  for (const tier of ["starter","medium","harder"]) {
    const inTier = A.filter(a => a.tier===tier);
    if (!inTier.some(a => visible(a))) continue;
    html += `<div class="tier-label">${TIER_LABELS[tier]}</div><div class="cards">`;
    for (const a of inTier) {
      const exp       = expandedRank===a.rank;
      const vis       = visible(a);
      const isClaimed = !!claimed[a.rank];
      const bw        = Math.round((a.build/5)*48);
      const typePill  = a.type==="agent"
        ? `<span class="pill p-agent">Sub-agent</span>`
        : `<span class="pill p-skill">Skill</span>`;
      const brCls     = BRANCHES[a.branch]?.pill || "";
      const brLabel   = BRANCHES[a.branch]?.label || "";
      const hasUnbuiltDeps = a.skillDeps.some(r => !claimed[r]);

      html += `<div class="card${exp?" expanded":""}${isClaimed?" claimed":""}${!vis?" hidden":""}" data-rank="${a.rank}">
  ${cbHtml(a.rank)}
  <div class="rank">${a.rank}</div>
  <div class="card-clickable" onclick="toggle(${a.rank})">
    <div class="card-title">${a.title}${hasUnbuiltDeps ? ' <span style="color:#EF9F27;font-size:10px;font-weight:400">⚠ has unbuilt dependencies</span>' : ""}</div>
    <div class="card-desc">${a.desc}</div>
    <div class="pills">
      ${typePill}
      <span class="pill ${BUILD_CLS[a.build]}">${BUILD_LABEL[a.build]}</span>
      <span class="pill ${brCls}">${brLabel}</span>
      ${a.isNew  ? `<span class="pill p-new">new v3</span>`  : ""}
      ${a.isLive ? `<span class="pill p-live">already live</span>` : ""}
    </div>
  </div>
  <div class="scores">
    <div class="srow"><span class="slabel">build</span><div class="strack"><div class="sfill" style="width:${bw}px;background:${BUILD_COLOR[a.build]}"></div></div></div>
  </div>
  ${isClaimed ? `<div class="claimed-banner">Claimed by ${claimed[a.rank]} for AI Week</div>` : ""}
  <div class="detail">
    <div class="dgrid">
      <div class="dblock"><div class="dlabel">Why this difficulty</div><div class="dtext">${a.why}</div></div>
      <div class="dblock"><div class="dlabel">Connectors</div><div class="dtext">${a.conn}</div></div>
      <div class="dblock"><div class="dlabel">Output</div><div class="dtext">${a.out}</div></div>
      <div class="dblock"><div class="dlabel">Type reasoning</div><div class="dtext">${a.typeReason}</div></div>
    </div>
    <div class="deps-block">
      <div class="dlabel">Data dependencies</div>
      <div class="deps-list">${a.deps.map(depChip).join("")}</div>
    </div>
    ${a.skillDeps.length ? `<div class="deps-block">
      <div class="dlabel">Must build first (skill dependencies)</div>
      <div class="deps-list">${a.skillDeps.map(skillDepChip).join("")}</div>
    </div>` : ""}
    <div class="type-block is-${a.type}">
      <div class="type-block-label">${a.type==="agent"?"Sub-agent":"Skill"}</div>
      <div class="type-block-text">${a.typeReason}</div>
    </div>
    ${a.note ? `<div class="team-note">${a.note}</div>` : ""}
  </div>
</div>`;
    }
    html += `</div>`;
  }
  document.getElementById("listView").innerHTML = html;
}

// ── TREE RENDER ────────────────────────────────────────────────────────
function renderTree() {
  // Build reverse dep map: which agents depend on each skill
  const dependedOnBy = {}; // rank → [ranks that depend on it]
  for (const a of A) {
    for (const r of (a.skillDeps || [])) {
      if (!dependedOnBy[r]) dependedOnBy[r] = [];
      dependedOnBy[r].push(a.rank);
    }
  }

  let html = "";
  for (const [brKey, brMeta] of Object.entries(BRANCHES)) {
    const items = A.filter(a => a.branch === brKey);
    if (!items.length) continue;
    html += `<div class="tree-branch">
  <div class="tree-branch-header ${brMeta.hdr}">${brMeta.label} <span class="br-count">${items.length} items</span></div>
  <div class="tree-nodes">`;

    for (const a of items) {
      const isClaimed = !!claimed[a.rank];
      const bw = Math.round((a.build/5)*48);
      const typePill = a.type==="agent"
        ? `<span class="pill p-agent" style="font-size:9px;padding:1px 5px;">Sub-agent</span>`
        : `<span class="pill p-skill" style="font-size:9px;padding:1px 5px;">Skill</span>`;
      const hasUnbuiltSkillDeps = a.skillDeps.some(r => !claimed[r]);
      const isDepOf = dependedOnBy[a.rank] ? dependedOnBy[a.rank] : [];

      html += `<div class="tree-node">`;

      // If this item has skill deps, show them as children above
      if (a.skillDeps.length) {
        html += `<div class="tree-dep-label">⚠ Build these first:</div>
<div class="tree-children">`;
        for (const depRank of a.skillDeps) {
          const dep = A.find(x => x.rank === depRank);
          if (!dep) continue;
          const depClaimed = !!claimed[dep.rank];
          html += `<div class="tree-child-node">
  <div class="tree-node-card${depClaimed?" claimed":""}" onclick="jumpTo(${dep.rank})" title="Jump to ${dep.title} in list view">
    <div class="tree-node-info">
      <div class="tree-node-title">${dep.title} ${depClaimed ? "✓" : ""}</div>
      <div class="tree-node-desc">${dep.desc}</div>
      <div class="tree-node-pills">
        <span class="pill p-skill" style="font-size:9px;padding:1px 5px;">Skill</span>
        <span class="pill ${BUILD_CLS[dep.build]}" style="font-size:9px;padding:1px 5px;">${BUILD_LABEL[dep.build]}</span>
        ${depClaimed ? `<span class="pill p-live" style="font-size:9px;padding:1px 5px;">✓ claimed</span>` : `<span class="dep-warning">not yet claimed</span>`}
      </div>
    </div>
  </div>
</div>`;
        }
        html += `</div>
<div class="tree-dep-label" style="color:#534AB7">→ Then build:</div>`;
      }

      // Main node
      html += `<div class="tree-node-card${hasUnbuiltSkillDeps?" has-deps-unbuilt":""}${isClaimed?" claimed":""}">
  ${cbHtml(a.rank)}
  <div class="tree-node-info" onclick="jumpTo(${a.rank})" style="cursor:pointer">
    <div class="tree-node-title">#${a.rank} ${a.title}</div>
    <div class="tree-node-desc">${a.desc}</div>
    <div class="tree-node-pills">
      ${typePill}
      <span class="pill ${BUILD_CLS[a.build]}" style="font-size:9px;padding:1px 5px;">${BUILD_LABEL[a.build]}</span>
      ${a.isNew  ? `<span class="pill p-new" style="font-size:9px;padding:1px 5px;">new v3</span>`  : ""}
      ${a.isLive ? `<span class="pill p-live" style="font-size:9px;padding:1px 5px;">already live</span>` : ""}
      ${isClaimed ? `<span class="pill p-live" style="font-size:9px;padding:1px 5px;">✓ ${claimed[a.rank]}</span>` : ""}
    </div>
    ${isDepOf.length ? `<div style="font-size:9px;color:#888780;margin-top:4px;">Needed by: ${isDepOf.map(r => {const x=A.find(y=>y.rank===r);return x?x.title:"";}).join(", ")}</div>` : ""}
  </div>
</div>`;

      html += `</div>`; // tree-node
    }

    html += `</div></div>`; // tree-nodes + tree-branch
  }
  document.getElementById("treeView").innerHTML = html;
}

// ── INIT ──────────────────────────────────────────────────────────────
updateSummary();
renderList();
</script>
</body>
</html>
